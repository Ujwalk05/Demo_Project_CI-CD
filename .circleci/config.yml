version: 2.1

parameters:
  environment:
    type: string
    default: "qaprod"
  tags:
    type: string
    default: "@SmokeTest"
  email:
    type: string
    default: "ujwal.kumar@winmore.io"

jobs:
  run-playwright-tests:
    docker:
      - image: cimg/openjdk:17.0-browsers
    steps:
      - checkout

      - run:
          name: Inject secrets into config
          command: |
            sed -i "s|openai.api.key=|openai.api.key=${OPENAI_API_KEY}|g" src/main/resources/config.properties

      - run:
          name: Install Maven
          command: |
            wget https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz
            tar -xzf apache-maven-3.9.6-bin.tar.gz
            sudo mv apache-maven-3.9.6 /opt/maven
            echo 'export PATH=/opt/maven/bin:$PATH' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Verify Maven
          command: mvn -version

      - run:
          name: Install Playwright Browsers
          command: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

      - run:
          name: Run Playwright Tests
          command: mvn clean test -Denvironment=<< pipeline.parameters.environment >> -Dcucumber.filter.tags="<< pipeline.parameters.tags >>" -DmailRecipients=<< pipeline.parameters.email >>

      - store_artifacts:
          path: target/surefire-reports
          destination: test-reports

      - store_artifacts:
          path: Reports
          destination: reports

workflows:
  manual-trigger:
    jobs:
      - run-playwright-tests