version: 2.1

jobs:
  run-playwright-tests:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout

      - run:
          name: Install Maven
          command: sudo apt-get update && sudo apt-get install -y maven

      - run:
          name: Install Playwright Browsers
          command: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps"

      - run:
          name: Run Tests
          command: mvn test

      - store_artifacts:
          path: target/surefire-reports
          destination: test-reports

      - store_artifacts:
          path: Reports
          destination: reports

workflows:
  manual-trigger:
    jobs:
      - run-playwright-tests:
          filters:
            tags:
              only: /^run-.*/
            branches:
              ignore: /.*/